<div class="content-card">
  <!-- Header: type badge + timestamp -->
  <div class="flex items-center justify-between mb-2">
    <div class="flex items-center gap-1.5">
      <span class="text-xs" aria-hidden="true">
        {{ contentTypeOptions[content().type].icon }}
      </span>
      <span class="text-xs font-medium text-teal-700">
        {{ contentTypeOptions[content().type].label }}
      </span>
    </div>
    <div class="flex items-center gap-1.5">
      @if (content().provider) {
        <span class="text-xs text-gray-400">
          via {{ content().provider }}
        </span>
        <span class="text-xs text-gray-300" aria-hidden="true">•</span>
      }
      <span class="text-xs text-gray-400">
        {{ content().createdAt | relativeTime }}
      </span>
    </div>
  </div>

  <p class="text-xs text-gray-400 mb-3">
    ✅ Contenu généré — sauvegardé dans le projet
  </p>

  <!-- Content body (preserves Markdown line breaks) -->
  <div class="content-body" aria-live="polite">
    {{ content().content }}
  </div>

  <!-- Action buttons -->
  <div class="flex gap-2 mt-3 justify-center">
    <button
      class="action-btn action-btn--primary"
      (click)="copyToClipboard()"
      [attr.aria-label]="
        copySuccess()
          ? 'Contenu copié'
          : 'Copier le contenu dans le presse-papier'
      "
    >
      @if (copySuccess()) {
        <span role="status">✅ Copié !</span>
      } @else {
        📋 Copier
      }
    </button>

    <button
      class="action-btn action-btn--export"
      (click)="exportMarkdown()"
      aria-label="Exporter le contenu en fichier Markdown"
    >
      📥 Export .md
    </button>

    @if (showDelete()) {
      <button
        class="action-btn action-btn--danger"
        (click)="deleted.emit(content().id)"
        [attr.aria-label]="'Supprimer la génération ' + contentTypeOptions[content().type].label"
      >
        🗑️ Supprimer
      </button>
    }
  </div>
</div>
